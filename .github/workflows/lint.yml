name: Lint

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check .

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: |
          yamllint . -d "{extends: relaxed, rules: {line-length: disable}}"
