name: Lint

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check . --select E9,F63,F7,F82 --ignore F821,F722